services:
  api:
    build:
      context: ..
      dockerfile: src/predict/Dockerfile
    ports:
      - "7001:8000"

  frontend:
    build:
      context: ..
      dockerfile: src/load/Dockerfile
      args:
        VITE_URL_EP: ${VITE_URL_EP}
    ports:
      - "7000:80"
    depends_on:
      - api

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - api
    restart: unless-stopped
